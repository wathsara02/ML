seed: 42
device: cpu
model:
  recurrent_hidden_size: 128
  recurrent_type: none
  critic_hidden_size: 128
algo:
  lr: 0.0003
  clip_range: 0.2
  entropy_coef: 0.02
  value_coef: 0.5
  gae_lambda: 0.95
  gamma: 0.99
  batch_size: 128
  ppo_epochs: 4
  max_grad_norm: 0.5
training:
  episodes: 10000
  exp_name: default_cpu
  reward_shaping: false
